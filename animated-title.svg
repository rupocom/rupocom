<svg xmlns="http://www.w3.org/2000/svg" width="600" height="90">
  <style>
    @keyframes typing {
      from { clip-path: inset(0 100% 0 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    @keyframes color-shift {
      0%   { fill: #58A6FF; }
      25%  { fill: #A371F7; }
      50%  { fill: #3FB950; }
      75%  { fill: #F78166; }
      100% { fill: #58A6FF; }
    }
    @keyframes cursor {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    text { font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace; }
    .line { font-size: 22px; fill: #58A6FF; animation: color-shift 4s ease-in-out infinite; }
    .cursor { fill: #58A6FF; animation: cursor 1s step-end infinite; }
    .typing-group { animation: typing 3s steps(30) forwards; }
  </style>
  <a target="_blank" href="https://github.com/rupocom">
    <text x="0" y="30" class="line">Reverse Engineer</text>
  </a>
  <a target="_blank" href="https://github.com/rupocom">
    <text x="0" y="60" class="line" style="animation-delay: 0.5s;">C++ Developer</text>
  </a>
  <a target="_blank" href="https://github.com/rupocom">
    <text x="0" y="90" class="line" style="animation-delay: 1s;">Computer Science Student</text>
  </a>
  <rect class="cursor" x="0" y="75" width="10" height="20"/>
</svg>
