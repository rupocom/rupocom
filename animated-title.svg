<svg xmlns="http://www.w3.org/2000/svg" width="600" height="88">
<style>
.l1{font-family:monospace;font-size:21px;fill:#58A6FF;animation:si .4s ease-out forwards,cc 5s ease-in-out .5s infinite}
.l2{font-family:monospace;font-size:21px;fill:#58A6FF;animation:si .4s ease-out .7s forwards,cc 5s ease-in-out 1.2s infinite}
.l3{font-family:monospace;font-size:21px;fill:#58A6FF;animation:si .4s ease-out 1.4s forwards,cc 5s ease-in-out 1.9s infinite}
.c{fill:#58A6FF;animation:bl 1s step-end infinite}
@keyframes si{from{transform:translateX(-6px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes cc{0%,100%{fill:#58A6FF}33%{fill:#A371F7}66%{fill:#3FB950}}
@keyframes bl{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
<text class="l1" x="0" y="27">Reverse Engineer</text>
<text class="l2" x="0" y="56">C++ Developer</text>
<text class="l3" x="0" y="85">Computer Science Student</text>
<rect class="c" x="0" y="70" width="9" height="17"/>
</svg>
